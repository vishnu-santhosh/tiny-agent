# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  <repo_location>/poky/meta \
  <repo_location>/poky/meta-poky \
  <repo_location>/poky/meta-yocto-bsp \
  <repo_location>/meta-raspberrypi \
  "

